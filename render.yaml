services:
  - type: web
    name: featherflow-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: featherflow-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://featherflow.onrender.com","http://localhost:5173","http://127.0.0.1:5173"]'

databases:
  - name: featherflow-db
    plan: free
